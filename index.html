<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#C0392B"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Q-Line Ritten"/>
<title>Q-Line Rittenregistratie</title>
<!-- v2.1 -->
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f5f5;color:#1a1a1a}
:root{--red:#C0392B;--redd:#922B21;--black:#1a1a1a;--white:#fff;--gray:#f0f0f0;--border:#ddd}
header{background:var(--black);color:var(--white);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
main{max-width:680px;margin:0 auto;width:100%;padding:16px;padding-bottom:90px}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 10px;cursor:pointer;color:#888;font-size:11px;background:none;border:none;position:relative}
.nb.on{color:var(--red);font-weight:600}
.ni{font-size:20px;line-height:1;margin-bottom:2px}
.badge{position:absolute;top:2px;right:8px;background:var(--red);color:#fff;border-radius:50%;width:14px;height:14px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700}
.card{background:#fff;border-radius:12px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.ch{padding:12px 16px;background:#f8f8f8;border-bottom:1px solid var(--border);font-weight:600;font-size:12px;color:#555;text-transform:uppercase;letter-spacing:.05em}
.cb{padding:16px}
.fg{margin-bottom:14px}
label{display:block;font-size:13px;font-weight:500;color:#555;margin-bottom:5px}
input,select,textarea{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;background:#fff;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,.1)}
textarea{resize:vertical;min-height:70px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 20px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:.2s;font-family:inherit}
.bp{background:var(--red);color:#fff}
.bp:hover{background:var(--redd)}
.bs{background:var(--gray);color:var(--black)}
.bg{background:none;color:#666;padding:8px 12px}
.bsu{background:#27ae60;color:#fff}
.bd{background:#e74c3c;color:#fff}
.bw{width:100%}
.bsm{padding:6px 12px;font-size:13px}
.bgrp{display:flex;gap:8px}
.stat{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
@media(min-width:480px){.stat{grid-template-columns:repeat(4,1fr)}}
.sc{background:#fff;border-radius:10px;border:1px solid var(--border);padding:12px 14px}
.sl{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.sv{font-size:22px;font-weight:700;margin-top:3px}
.ss{font-size:11px;color:#aaa;margin-top:2px}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:8px}
.pt{font-size:20px;font-weight:700}
.ps{font-size:13px;color:#888;margin-top:2px}
.alert{padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:12px}
.ae{background:#fdf2f2;border:1px solid #f5c6cb;color:#721c24}
.as{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}
.ai{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
.aw{background:#fefce8;border:1px solid #fde68a;color:#854d0e}
.spin{display:flex;justify-content:center;padding:48px 0}
.sr{width:36px;height:36px;border:3px solid #e0e0e0;border-top-color:var(--red);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.tri{padding:14px 16px;cursor:pointer;border-bottom:1px solid #f0f0f0;transition:.15s}
.tri:last-child{border-bottom:none}
.tri:hover{background:#fafafa}
.empty{text-align:center;padding:48px 16px;color:#aaa}
.ei{font-size:48px;margin-bottom:12px}
.dtbl{width:100%;border-collapse:collapse}
.dtbl tr:nth-child(even){background:#f8f8f8}
.dtbl td{padding:10px 16px;font-size:14px;border-bottom:1px solid #f5f5f5}
.dtbl td:first-child{font-weight:500;color:#666;width:42%}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:#f5f5f5}
.login-logo{background:var(--black);border-radius:16px;padding:28px 36px;text-align:center;margin-bottom:24px;width:100%;max-width:360px}
.login-card{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.tab-bar{display:flex;background:#f0f0f0;border-radius:10px;padding:3px;margin-bottom:16px}
.tb{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:.2s;font-family:inherit;color:#888}
.tb.on{background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.1);color:#000;font-weight:600}
.adrop{position:absolute;background:#fff;border:1px solid var(--border);border-radius:8px;z-index:999;width:100%;max-height:180px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.12);margin-top:2px}
.adrop-item{padding:11px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid #f5f5f5}
.adrop-item:hover{background:#f5f5f5}
.adrop-item:last-child{border-bottom:none}
.awrap{position:relative}

/* ── Wizard styles ───────────────────────────── */
.wiz-wrap{max-width:520px;margin:0 auto}
.wiz-progress{display:flex;align-items:center;gap:0;margin-bottom:24px}
.wiz-step-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;transition:.2s}
.wiz-step-dot.done{background:var(--red);color:#fff}
.wiz-step-dot.active{background:var(--red);color:#fff;box-shadow:0 0 0 4px rgba(192,57,43,.2)}
.wiz-step-dot.todo{background:#e0e0e0;color:#aaa}
.wiz-line{flex:1;height:3px;background:#e0e0e0}
.wiz-line.done{background:var(--red)}
.wiz-card{background:#fff;border-radius:16px;border:1px solid var(--border);padding:24px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.wiz-label{font-size:13px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.wiz-question{font-size:22px;font-weight:700;margin-bottom:20px;line-height:1.3}
.wiz-input-big{width:100%;font-size:24px;font-weight:700;padding:16px;border:2px solid var(--border);border-radius:10px;text-align:center;font-family:inherit;-webkit-appearance:none;background:#fff}
.wiz-input-big:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,.1)}
.wiz-input-std{width:100%;font-size:16px;padding:14px;border:2px solid var(--border);border-radius:10px;font-family:inherit;-webkit-appearance:none;background:#fff}
.wiz-input-std:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,.1)}
.wiz-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px}
.wiz-type-btn{padding:20px 12px;border-radius:12px;border:2px solid var(--border);background:#fff;cursor:pointer;font-size:16px;font-weight:600;font-family:inherit;transition:.2s;display:flex;flex-direction:column;align-items:center;gap:6px}
.wiz-type-btn .icon{font-size:32px}
.wiz-type-btn.selected{border-color:var(--red);background:#fdf2f2;color:var(--red)}
.wiz-next{width:100%;padding:18px;font-size:17px;font-weight:700;border-radius:12px;border:none;cursor:pointer;font-family:inherit;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.wiz-next:disabled{background:#e0e0e0!important;color:#aaa!important;cursor:not-allowed}
.wiz-next.ready{background:var(--red);color:#fff}
.wiz-next.ready:hover{background:var(--redd)}
.wiz-back{width:100%;padding:14px;font-size:15px;font-weight:600;border-radius:12px;border:none;cursor:pointer;font-family:inherit;background:#f0f0f0;color:#555;margin-top:8px}
.wiz-summary{background:#f8f8f8;border-radius:10px;padding:16px;margin-top:16px}
.wiz-sum-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;font-size:14px}
.wiz-sum-row:last-child{border-bottom:none}
.wiz-sum-label{color:#888}
.wiz-sum-val{font-weight:600;text-align:right;max-width:60%}
.wiz-hint{font-size:13px;color:#aaa;margin-top:8px;text-align:center}
.wiz-km-diff{font-size:16px;font-weight:700;color:var(--red);text-align:center;margin-top:8px;min-height:24px}
.wiz-vehicle-card{border:2px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;margin-bottom:8px;transition:.2s;background:#fff;display:flex;align-items:center;justify-content:space-between}
.wiz-vehicle-card.selected{border-color:var(--red);background:#fdf2f2}
.wiz-vehicle-card.inuse{opacity:.5;cursor:not-allowed;border-style:dashed}
.wiz-gps-btn{background:#f0f4ff;border:2px solid #c0ccee;border-radius:10px;padding:12px 16px;cursor:pointer;font-size:22px;flex-shrink:0;transition:.2s}
.wiz-gps-btn:active{background:#dde8ff}
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';
import { getFirestore, collection, addDoc, getDocs, getDoc, doc, updateDoc, setDoc, deleteDoc, query, where, orderBy, limit, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

const FB = {
  apiKey: "AIzaSyAk4Xus-k0ZTCIMluh9QMslsg-I21uMoDQ",
  authDomain: "qline-ritten.firebaseapp.com",
  projectId: "qline-ritten",
  storageBucket: "qline-ritten.firebasestorage.app",
  messagingSenderId: "999415794642",
  appId: "1:999415794642:web:15512fc2e367df42ccd60b"
};

const app  = initializeApp(FB);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  user: null, profile: null,
  page: 'dash', loading: true, saving: false,
  trips: [], vehicles: [], users: [],
  activeRides: {},
  editId: null,
  detailTrip: null,
  adminTab: 'vehicles',
  msg: null, msgType: 'success',
  ff: { from:'', to:'', type:'', status:'', search:'' },
  // Wizard state
  wiz: {
    step: 1,
    // vertrek
    vid: '', km: '', addr: '', purpose: '', tripType: 'Zakelijk',
    // aankomst
    avid: '', endKm: '', endAddr: '',
  }
};

// ── Helpers ───────────────────────────────────────────────────────────────────
const R = document.getElementById('root');
const isAdmin = () => S.profile?.role === 'admin';
const pad = n => String(n).padStart(2,'0');
const nowTime = () => { const d=new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); };
const nowDate = () => { const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); };
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function flash(msg, type='success') {
  S.msg = msg; S.msgType = type;
  render();
  setTimeout(() => { S.msg = null; render(); }, 3500);
}

function go(page, extra={}) {
  S.page = page;
  Object.assign(S, extra);
  window.scrollTo(0,0);
  render();
}

// ── Firebase active rides ─────────────────────────────────────────────────────
async function loadAR() {
  try {
    const snap = await getDocs(collection(db,'active_rides'));
    S.activeRides = {};
    snap.docs.forEach(d => { S.activeRides[d.data().vehicle_id] = {...d.data(), _docId: d.id}; });
    const oldAR = JSON.parse(localStorage.getItem('qline_ar')||'{}');
    for (const [vid, ride] of Object.entries(oldAR)) {
      if (!S.activeRides[vid] && ride.start_km) {
        const ref = await addDoc(collection(db,'active_rides'), {...ride, migrated: true, created_at: serverTimestamp()});
        S.activeRides[vid] = {...ride, _docId: ref.id};
      }
    }
    if (Object.keys(oldAR).length > 0) localStorage.removeItem('qline_ar');
  } catch(e) {
    try { S.activeRides = JSON.parse(localStorage.getItem('qline_ar')||'{}'); } catch(e2) { S.activeRides = {}; }
  }
  const saved = JSON.parse(localStorage.getItem('qline_addr')||'[]');
  const qline = 'Haarbrinksweg 47, Geesteren';
  if (!saved.includes(qline)) { saved.unshift(qline); localStorage.setItem('qline_addr', JSON.stringify(saved)); }
}

async function saveAR_start(vid, ride) {
  const ref = await addDoc(collection(db,'active_rides'), ride);
  ride._docId = ref.id;
  S.activeRides[vid] = ride;
}

async function saveAR_stop(vid) {
  try {
    const ride = S.activeRides[vid];
    if (ride?._docId) await deleteDoc(doc(db,'active_rides', ride._docId));
    const snap = await getDocs(query(collection(db,'active_rides'), where('vehicle_id','==',vid)));
    for (const d of snap.docs) await deleteDoc(doc(db,'active_rides', d.id));
  } catch(e) { console.log('saveAR_stop error:', e); }
  delete S.activeRides[vid];
}

// ── localStorage helpers ──────────────────────────────────────────────────────
function getLastVehicle() { return localStorage.getItem('qline_last_vehicle')||''; }
function setLastVehicle(vid) { localStorage.setItem('qline_last_vehicle', vid); }
function getVehicleKm(vid) {
  try { return JSON.parse(localStorage.getItem('qline_vkm')||'{}')[vid]||null; } catch(e) { return null; }
}
function setVehicleKm(vid, km, addr) {
  try {
    const vkm = JSON.parse(localStorage.getItem('qline_vkm')||'{}');
    vkm[vid] = {km, addr, date: new Date().toISOString().slice(0,10)};
    localStorage.setItem('qline_vkm', JSON.stringify(vkm));
  } catch(e) {}
}
function getSavedAddresses() {
  try { return JSON.parse(localStorage.getItem('qline_addr')||'["Haarbrinksweg 47, Geesteren"]'); } catch(e) { return ['Haarbrinksweg 47, Geesteren']; }
}
function saveAddress(addr) {
  if (!addr || addr.length < 3) return;
  const saved = getSavedAddresses();
  if (!saved.includes(addr)) { saved.unshift(addr); localStorage.setItem('qline_addr', JSON.stringify(saved.slice(0,40))); }
}

// ── Auth ──────────────────────────────────────────────────────────────────────
const authTO = setTimeout(() => { if(S.loading){S.loading=false;render();} }, 8000);
onAuthStateChanged(auth, async u => {
  clearTimeout(authTO);
  S.user = u;
  if (u) {
    try {
      const snap = await getDoc(doc(db,'users',u.uid));
      if (!snap.exists()) {
        await setDoc(doc(db,'users',u.uid),{email:u.email,full_name:u.email,role:'medewerker',created_at:serverTimestamp()});
        S.profile = {email:u.email,full_name:u.email,role:'medewerker'};
      } else { S.profile = snap.data(); }
      await loadVehicles();
      await loadTrips();
      loadAR();
      loadVehicleStatus();
    } catch(e) { console.error(e); }
  }
  S.loading = false;
  render();
});

// ── Data ──────────────────────────────────────────────────────────────────────
async function loadTrips() {
  let q = isAdmin()
    ? query(collection(db,'trips'), orderBy('trip_date','desc'), limit(200))
    : query(collection(db,'trips'), where('user_id','==',S.user.uid), orderBy('trip_date','desc'), limit(100));
  const snap = await getDocs(q);
  S.trips = snap.docs.map(d => ({id:d.id,...d.data()}));
}
async function loadVehicles() {
  const snap = await getDocs(query(collection(db,'vehicles'), orderBy('license')));
  S.vehicles = snap.docs.map(d => ({id:d.id,...d.data()})).filter(v => v.active!==false);
}
async function loadUsers() {
  const snap = await getDocs(collection(db,'users'));
  S.users = snap.docs.map(d => ({id:d.id,...d.data()}));
}
function loadVehicleStatus() {
  for (const v of S.vehicles) {
    const vTrips = S.trips.filter(t => t.vehicle_id === v.id && t.odometer_end);
    if (vTrips.length > 0) {
      const last = vTrips.sort((a,b) => (b.trip_date||'').localeCompare(a.trip_date||''))[0];
      v.last_km = last.odometer_end; v.last_addr = last.arrival_address; v.last_date = last.trip_date;
    }
    const lsData = getVehicleKm(v.id);
    if (lsData && (!v.last_km || lsData.km >= v.last_km)) { v.last_km = lsData.km; v.last_addr = lsData.addr; }
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  window.S = S;
  if (S.loading) { R.innerHTML = '<div class="spin"><div class="sr"></div></div>'; return; }
  if (!S.user)   { R.innerHTML = renderLogin(); bindLogin(); return; }
  R.innerHTML = renderShell();
  bindEvents();
}

function renderShell() {
  const actCnt = Object.keys(S.activeRides).length;
  return `
<header>
  <div style="display:flex;align-items:center;gap:8px">
    <div style="width:4px;height:22px;background:var(--red);border-radius:2px"></div>
    <span style="font-weight:700;font-size:13px;letter-spacing:.1em">Q-LINE RITTEN</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:#aaa">
    <span>${esc(S.profile?.full_name?.split(' ')[0]||'')}</span>
    ${isAdmin()?'<span style="background:var(--red);color:#fff;padding:2px 7px;border-radius:10px;font-size:11px">Admin</span>':''}
    <button onclick="doSignOut()" style="background:none;border:none;color:#888;cursor:pointer;font-size:12px">Uit</button>
  </div>
</header>
<main>${S.msg?`<div class="alert a${S.msgType[0]}">${S.msg}</div>`:''}${renderPage()}</main>
<nav class="nav">
  <button class="nb ${S.page==='dash'?'on':''}" onclick="go('dash')"><span class="ni">📊</span>Dashboard</button>
  <button class="nb ${S.page==='rijden'?'on':''}" onclick="goWizRijden()"><span class="ni">🚗</span>Ga rijden</button>
  <button class="nb ${S.page==='aankomst'?'on':''}" onclick="goWizAankomst()">${actCnt>0?`<span class="badge">${actCnt}</span>`:''}<span class="ni">📍</span>Aankomst</button>
  <button class="nb ${S.page==='trips'?'on':''}" onclick="go('trips')"><span class="ni">📋</span>Ritten</button>
  ${isAdmin()?`<button class="nb ${S.page==='admin'?'on':''}" onclick="go('admin')"><span class="ni">⚙️</span>Beheer</button>`:''}
</nav>`;
}

function renderPage() {
  switch(S.page) {
    case 'dash':         return renderDash();
    case 'rijden':       return renderWizRijden();
    case 'aankomst':     return renderWizAankomst();
    case 'trips':        return renderTrips();
    case 'detail':       return renderDetail();
    case 'admin':        return renderAdmin();
    default: return renderDash();
  }
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDash() {
  const now = new Date();
  const mo = now.getFullYear()+'-'+pad(now.getMonth()+1);
  const mt = S.trips.filter(t => (t.trip_date||'').startsWith(mo));
  const tot = mt.reduce((s,t)=>s+(t.km_total||0),0);
  const zak = mt.filter(t=>t.trip_type==='Zakelijk').reduce((s,t)=>s+(t.km_total||0),0);
  const pri = mt.filter(t=>t.trip_type==='Privé').reduce((s,t)=>s+(t.km_total||0),0);
  const open = mt.filter(t=>t.status==='open').length;
  const actCnt = Object.keys(S.activeRides).length;
  const pvmap = {};
  mt.forEach(t=>{ const k=t.vehicle_license||'?'; pvmap[k]=(pvmap[k]||0)+(t.km_total||0); });
  const pvArr = Object.entries(pvmap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const openList = S.trips.filter(t=>t.status==='open').slice(0,5);
  const hr = new Date().getHours();
  const groet = hr < 12 ? 'Goedemorgen' : hr < 18 ? 'Goedemiddag' : 'Goedenavond';
  return `
<div class="ph">
  <div><div class="pt">${groet}, ${esc(S.profile?.full_name?.split(' ')[0]||'')}</div>
  <div class="ps">${now.toLocaleDateString('nl-NL',{month:'long',year:'numeric'})}</div></div>
  <div style="display:flex;gap:6px">
    <button class="btn bs bsm" onclick="exportCSV()">CSV</button>
    <button class="btn bp bsm" onclick="goWizRijden()">🚗 Rijden</button>
  </div>
</div>
<div class="stat">
  <div class="sc"><div class="sl">Totaal km</div><div class="sv">${tot}</div><div class="ss">${mt.length} ritten</div></div>
  <div class="sc"><div class="sl">Zakelijk</div><div class="sv" style="color:#084298">${zak}</div><div class="ss">km</div></div>
  <div class="sc"><div class="sl">Privé</div><div class="sv" style="color:#4a1a6e">${pri}</div><div class="ss">km</div></div>
  <div class="sc"><div class="sl">Open</div><div class="sv" style="color:${open>0?'#856404':'#166534'}">${open}</div><div class="ss">te controleren</div></div>
</div>
${actCnt>0?`
<div class="card" style="border-left:4px solid var(--red)">
  <div class="ch" style="background:#fdf2f2;color:#721c24">🚗 Onderweg (${actCnt})</div>
  ${Object.entries(S.activeRides).map(([vid,ride])=>{
    const v=S.vehicles.find(x=>x.id===vid);
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #fdf2f2">
      <div><p style="font-weight:600">${esc(v?.license||'?')} · ${esc(ride.user_name||'')}</p>
      <p style="font-size:12px;color:#888">Van: ${esc(ride.start_addr||'?')} · ${esc(ride.dep_time||'')} · ${ride.start_km} km</p></div>
      <button class="btn bp bsm" onclick="goWizAankomst()">📍 Aankomst</button>
    </div>`;
  }).join('')}
</div>`:''}
${isAdmin()&&openList.length>0?`
<div class="card" style="border-left:3px solid #fbbf24">
  <div class="ch" style="background:#fefce8;color:#854d0e">⏳ Openstaand (${openList.length})</div>
  ${openList.map(t=>`
  <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #fef3cd;font-size:13px">
    <span>${esc(t.trip_date)} · ${esc(t.user_name||'')} · <strong>${t.km_total||0} km</strong></span>
    <div style="display:flex;gap:4px">
      <button class="btn bsu bsm" onclick="approve('${t.id}','goedgekeurd')">✓</button>
      <button class="btn bd bsm" onclick="approve('${t.id}','afgekeurd')">✗</button>
    </div>
  </div>`).join('')}
</div>`:''}
${pvArr.length>0?`
<div class="card">
  <div class="ch">Per voertuig</div>
  <div class="cb">
    ${pvArr.map(([k,v])=>`
    <div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span>${esc(k)}</span><span>${v} km</span></div>
      <div style="height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden">
        <div style="height:100%;background:var(--red);border-radius:3px;width:${tot?Math.round(v/tot*100):0}%"></div>
      </div>
    </div>`).join('')}
  </div>
</div>`:''}
${(() => {
  const today = nowDate();
  // Medewerker ziet eigen ritten vandaag, admin ziet alle ritten vandaag
  const todayTrips = S.trips.filter(t =>
    t.trip_date === today && (isAdmin() || t.user_id === S.user.uid)
  );
  if (!todayTrips.length) return '';
  return `
<div class="card" style="border-left:4px solid #27ae60">
  <div class="ch" style="background:#f0fdf4;color:#166534">📅 Vandaag (${todayTrips.length} rit${todayTrips.length>1?'ten':''})</div>
  ${todayTrips.map(t => {
    const bmap = {open:'background:#fef3cd;color:#856404',goedgekeurd:'background:#d1e7dd;color:#0a3622',afgekeurd:'background:#f8d7da;color:#721c24'};
    return `<div style="padding:12px 16px;border-bottom:1px solid #f0fdf4">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
        <div style="flex:1;min-width:0">
          ${isAdmin()?`<div style="font-size:12px;color:#888;margin-bottom:2px">${esc(t.user_name||'')} · ${esc(t.vehicle_license||'')}</div>`:''}
          <div style="font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.departure_address||'?')} → ${esc(t.arrival_address||'?')}</div>
          <div style="font-size:12px;color:#aaa;margin-top:2px">${esc(t.purpose||'')} · ${esc(t.departure_time||'')}–${esc(t.arrival_time||'')}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:18px;font-weight:700;color:#27ae60">${t.km_total||0} km</div>
          <span style="display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:600;${bmap[t.status]||bmap.open}">${t.status||'open'}</span>
        </div>
      </div>
    </div>`;
  }).join('')}
</div>`;
})()}
<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #f0f0f0">
    <span style="font-weight:600;font-size:12px;color:#555;text-transform:uppercase">Recente ritten</span>
    <button class="btn bg bsm" onclick="go('trips')">Alle →</button>
  </div>
  ${S.trips.slice(0,5).map(t=>tripRow(t)).join('')}
  ${S.trips.length===0?'<div class="empty"><div class="ei">🚗</div><p>Nog geen ritten</p></div>':''}
</div>`;
}

// ══════════════════════════════════════════════════════════════════
// WIZARD — VERTREKKEN  (4 stappen)
// Stap 1: Voertuig kiezen
// Stap 2: Beginstand km
// Stap 3: Vertrekadres
// Stap 4: Doel + type → bevestigen
// ══════════════════════════════════════════════════════════════════
window.goWizRijden = () => {
  const lastVid = getLastVehicle();
  S.wiz = { step:1, vid: lastVid, km:'', addr:'', purpose:'', tripType:'Zakelijk', avid:'', endKm:'', endAddr:'' };
  // Pre-fill km en addr van vorig voertuig
  if (lastVid) {
    const v = S.vehicles.find(x => x.id === lastVid);
    const lsKm = getVehicleKm(lastVid);
    S.wiz.km = String(v?.last_km || lsKm?.km || '');
    S.wiz.addr = localStorage.getItem('qline_last_addr_' + lastVid) || v?.last_addr || lsKm?.addr || '';
  }
  go('rijden');
};

function renderWizRijden() {
  const step = S.wiz.step;
  const kmKnown = !!S.wiz.km;
  const totalSteps = kmKnown ? 3 : 4;
  // Stap mapping: als km bekend, sla stap 2 over in weergave
  const displayStep = (kmKnown && step >= 3) ? step - 1 : step;
  const labels = kmKnown ? ['Voertuig','Vertrekadres','Bevestigen'] : ['Voertuig','Kilometerstand','Vertrekadres','Bevestigen'];

  const progressHtml = `
<div class="wiz-progress">
  ${labels.map((l,i) => {
    const n = i+1;
    const cls = n < displayStep ? 'done' : n === displayStep ? 'active' : 'todo';
    return (i>0?`<div class="wiz-line ${n<=displayStep?'done':''}"></div>`:'') +
      `<div class="wiz-step-dot ${cls}">${n < displayStep ? '✓' : n}</div>`;
  }).join('')}
</div>`;

  let content = '';

  if (step === 1) {
    // Voertuig kiezen
    const cards = S.vehicles.map(v => {
      const inUse = !!S.activeRides[v.id];
      const sel = S.wiz.vid === v.id;
      const km = v.last_km ? v.last_km + ' km' : 'geen stand bekend';
      return `<div class="wiz-vehicle-card ${sel?'selected':''} ${inUse?'inuse':''}"
        onclick="${inUse?'':'wizSelectVehicle(\''+v.id+'\')'}">
        <div>
          <div style="font-size:18px;font-weight:700">${esc(v.license)}</div>
          <div style="font-size:13px;color:#888;margin-top:2px">${esc(v.brand||'')} ${esc(v.model||'')} · ${km}</div>
          ${inUse?'<div style="font-size:12px;color:#e74c3c;margin-top:3px">⚠️ Nu in gebruik</div>':''}
        </div>
        ${sel ? '<div style="color:var(--red);font-size:22px">✓</div>' : ''}
      </div>`;
    }).join('');

    content = `
<div class="wiz-label">Stap 1 van ${totalSteps}</div>
<div class="wiz-question">Welke auto neem je?</div>
${cards}
<button class="wiz-next ${S.wiz.vid?'ready':''}" onclick="wizNext()" ${S.wiz.vid?'':'disabled'}>
  Volgende →
</button>`;
  }

  else if (step === 2) {
    const v = S.vehicles.find(x => x.id === S.wiz.vid);
    const hasKnownKm = !!S.wiz.km;

    if (hasKnownKm) {
      // Bekende stand — toon ter bevestiging, geen invoer nodig
      content = `
<div class="wiz-label">Stap 2 van ${totalSteps}</div>
<div class="wiz-question">Klopt de kilometerstand?</div>
<div style="background:#f8f8f8;border:2px solid var(--red);border-radius:14px;padding:24px;text-align:center;margin-bottom:20px">
  <div style="font-size:48px;font-weight:800;color:var(--red);letter-spacing:-1px">${esc(S.wiz.km)}</div>
  <div style="font-size:15px;color:#888;margin-top:4px">km — ${esc(v?.license||'')} · ${esc(v?.brand||'')}</div>
</div>
<button class="wiz-next ready" onclick="wizNext()">✓ Klopt — verder</button>
<button onclick="wizKmCorrect()" style="width:100%;margin-top:10px;padding:14px;background:#fff;border:1px solid var(--border);border-radius:10px;font-size:15px;cursor:pointer;color:#555">
  ✏️ Andere stand invullen
</button>`;
    } else {
      // Geen stand bekend — moet invullen
      content = `
<div class="wiz-label">Stap 2 van ${totalSteps}</div>
<div class="wiz-question">Wat is de huidige kilometerstand?</div>
<div class="alert aw" style="margin-bottom:16px">Eerste rit voor dit voertuig — vul de beginstand in</div>
<input class="wiz-input-big" type="number" id="wiz-km" value=""
  placeholder="bijv. 171962"
  oninput="S.wiz.km=this.value;wizCheckNext2()"
  inputmode="numeric" autofocus/>
<div class="wiz-hint">Vul de stand in zoals op de teller</div>
<button class="wiz-next" id="wiz-next2" onclick="wizNext()" disabled>
  Volgende →
</button>`;
    }
  }

  else if (step === 3) {
    const saved = getSavedAddresses();
    const suggestions = saved.slice(0,4).map(a =>
      `<div onclick="wizPickAddr('${a.replace(/'/g,"\\'")}')"
        style="padding:12px 14px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:#fff;font-size:14px;margin-bottom:8px">
        📍 ${esc(a)}
      </div>`
    ).join('');

    // Km correctie: inline invoerveld tonen als nodig
    const kmCorrectMode = S.wiz._kmCorrect;
    content = `
<div class="wiz-label">Stap ${displayStep} van ${totalSteps}</div>
<div class="wiz-question">Waar vertrek je vandaan?</div>

${kmCorrectMode ? `
<div style="margin-bottom:16px">
  <label style="font-size:13px;font-weight:600;color:#555;display:block;margin-bottom:6px">Kilometerstand corrigeren</label>
  <input class="wiz-input-big" type="number" id="wiz-km-fix" value="${esc(S.wiz.km)}"
    placeholder="bijv. 171962" inputmode="numeric"
    oninput="S.wiz.km=this.value;document.getElementById('wiz-km-disp').textContent=this.value"/>
  <button onclick="S.wiz._kmCorrect=false;render()" style="margin-top:8px;width:100%;padding:10px;background:#f0f0f0;border:none;border-radius:8px;cursor:pointer;font-size:14px">✓ Opslaan</button>
</div>` : `
<div style="display:flex;align-items:center;justify-content:space-between;background:#f8f8f8;border-radius:8px;padding:10px 14px;margin-bottom:14px">
  <span style="font-size:13px;color:#888">Beginstand: <strong id="wiz-km-disp">${esc(S.wiz.km)}</strong> km</span>
  <button onclick="S.wiz._kmCorrect=true;render()" style="background:none;border:none;color:var(--red);font-size:13px;cursor:pointer;font-weight:600">✏️ Aanpassen</button>
</div>`}

<div style="display:flex;gap:8px;margin-bottom:12px">
  <input class="wiz-input-std" type="text" id="wiz-addr" value="${esc(S.wiz.addr)}"
    placeholder="Adres of locatie..."
    oninput="S.wiz.addr=this.value;wizCheckNext3();wizAddrSug(this.value)"
    autocomplete="off" style="flex:1"/>
  <button class="wiz-gps-btn" onclick="wizGetGPS()">📍</button>
</div>
<div id="wiz-addr-sug" style="margin-bottom:12px"></div>
${S.wiz.addr?'':suggestions}
<div class="wiz-hint">Tik het adres of gebruik 📍 voor automatische locatie</div>
<button class="wiz-next ${S.wiz.addr&&!kmCorrectMode?'ready':''}" id="wiz-next3" onclick="wizNext()" ${S.wiz.addr&&!kmCorrectMode?'':'disabled'}>
  Volgende →
</button>`;
  }

  else if (step === 4) {
    const v = S.vehicles.find(x => x.id === S.wiz.vid);
    const canConfirm = S.wiz.purpose && S.wiz.tripType;
    content = `
<div class="wiz-label">Stap 4 van ${totalSteps}</div>
<div class="wiz-question">Wat is het doel van de rit?</div>
<input class="wiz-input-std" type="text" id="wiz-purpose" value="${esc(S.wiz.purpose)}"
  placeholder="bijv. klantbezoek, levering, ophalen..."
  oninput="S.wiz.purpose=this.value;wizCheckNext4()"
  style="margin-bottom:20px"/>

<div style="font-size:14px;font-weight:600;color:#555;margin-bottom:10px">Type rit</div>
<div class="wiz-type-grid" style="margin-bottom:20px">
  <button class="wiz-type-btn ${S.wiz.tripType==='Zakelijk'?'selected':''}" onclick="wizSetType('Zakelijk')">
    <span class="icon">💼</span>Zakelijk
  </button>
  <button class="wiz-type-btn ${S.wiz.tripType==='Privé'?'selected':''}" onclick="wizSetType('Privé')">
    <span class="icon">🏠</span>Privé
  </button>
</div>

<div class="wiz-summary">
  <div style="font-size:12px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:10px">Samenvatting</div>
  <div class="wiz-sum-row"><span class="wiz-sum-label">Voertuig</span><span class="wiz-sum-val">${esc(v?.license||'?')} · ${esc(v?.brand||'')}</span></div>
  <div class="wiz-sum-row"><span class="wiz-sum-label">Beginstand</span><span class="wiz-sum-val">${esc(S.wiz.km)} km <button onclick="S.wiz._kmCorrect=true;S.wiz.step=3;render()" style="background:none;border:none;color:var(--red);font-size:12px;cursor:pointer">✏️</button></span></div>
  <div class="wiz-sum-row"><span class="wiz-sum-label">Vertrekadres</span><span class="wiz-sum-val">${esc(S.wiz.addr)}</span></div>
  <div class="wiz-sum-row"><span class="wiz-sum-label">Tijd</span><span class="wiz-sum-val">${nowTime()}</span></div>
</div>

<button class="wiz-next ${canConfirm&&!S.saving?'ready':''}" id="wiz-confirm" style="margin-top:16px"
  onclick="wizStartRit()" ${canConfirm&&!S.saving?'':'disabled'}>
  ${S.saving ? '⏳ Bezig...' : '🚗 Vertrekken — bevestigen'}
</button>`;
  }

  return `
<div class="wiz-wrap">
  ${progressHtml}
  <div class="wiz-card">${content}</div>
  ${step > 1 ? `<button class="wiz-back" onclick="wizBack()">← Terug</button>` : ''}
  <button class="wiz-back" style="margin-top:4px;background:transparent;color:#aaa" onclick="go('dash')">Annuleren</button>
</div>`;
}

// ══════════════════════════════════════════════════════════════════
// WIZARD — AANKOMST  (3 stappen)
// Stap 1: Voertuig (als meerdere actief)
// Stap 2: Aankomstadres
// Stap 3: Eindstand km → bevestigen
// ══════════════════════════════════════════════════════════════════
window.goWizAankomst = () => {
  const actief = S.vehicles.filter(v => S.activeRides[v.id]);
  if (!actief.length) { go('aankomst'); return; }
  // Als maar 1 actief: sla stap 1 over
  const startStep = actief.length === 1 ? 2 : 1;
  const startVid = actief.length === 1 ? actief[0].id : '';
  S.wiz = { ...S.wiz, step: startStep, avid: startVid, endKm:'', endAddr:'' };
  go('aankomst');
};

function renderWizAankomst() {
  const actief = S.vehicles.filter(v => S.activeRides[v.id]);
  if (!actief.length) return `
<div class="ph"><div class="pt">📍 Aangekomen</div></div>
<div class="card"><div class="cb">
  <div class="empty"><div class="ei">🚗</div><p>Geen actieve ritten.<br>Druk eerst op "Ga rijden".</p></div>
</div></div>
<button class="btn bs bw" onclick="go('dash')" style="margin-top:8px">← Terug</button>`;

  const step = S.wiz.step;
  const totalSteps = actief.length > 1 ? 3 : 2;
  const labels = actief.length > 1 ? ['Voertuig','Aankomstadres','Kilometerstand'] : ['Aankomstadres','Kilometerstand'];

  const progressHtml = `
<div class="wiz-progress">
  ${labels.map((l,i) => {
    const n = i+1;
    const adjustedStep = actief.length > 1 ? step : step - 1;
    const cls = n < adjustedStep ? 'done' : n === adjustedStep ? 'active' : 'todo';
    return (i>0?`<div class="wiz-line ${n<adjustedStep?'done':''}"></div>`:'') +
      `<div class="wiz-step-dot ${cls}">${n < adjustedStep ? '✓' : n}</div>`;
  }).join('')}
</div>`;

  let content = '';
  const ride = S.wiz.avid ? S.activeRides[S.wiz.avid] : null;
  const veh = S.wiz.avid ? S.vehicles.find(x => x.id === S.wiz.avid) : null;

  if (step === 1 && actief.length > 1) {
    // Kies voertuig
    const cards = actief.map(v => {
      const r = S.activeRides[v.id];
      const sel = S.wiz.avid === v.id;
      return `<div class="wiz-vehicle-card ${sel?'selected':''}" onclick="wizSelectAVehicle('${v.id}')">
        <div>
          <div style="font-size:18px;font-weight:700">${esc(v.license)} · ${esc(v.brand||'')}</div>
          <div style="font-size:13px;color:#888;margin-top:3px">Van: ${esc(r.start_addr||'?')} · ${r.start_km} km</div>
          <div style="font-size:13px;color:#666">Doel: ${esc(r.purpose||'')}</div>
        </div>
        ${sel ? '<div style="color:var(--red);font-size:22px">✓</div>' : ''}
      </div>`;
    }).join('');

    content = `
<div class="wiz-label">Stap 1 van ${totalSteps}</div>
<div class="wiz-question">Met welke auto ben je aangekomen?</div>
${cards}
<button class="wiz-next ${S.wiz.avid?'ready':''}" onclick="wizANext()" ${S.wiz.avid?'':'disabled'}>Volgende →</button>`;
  }

  else if (step === 2) {
    const saved = getSavedAddresses();
    const suggestions = saved.slice(0,4).map(a =>
      `<div onclick="wizPickEndAddr('${a.replace(/'/g,"\\'")}')"
        style="padding:12px 14px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:#fff;font-size:14px;margin-bottom:8px">
        📍 ${esc(a)}
      </div>`
    ).join('');

    content = `
<div class="wiz-label">Stap ${actief.length>1?2:1} van ${totalSteps}</div>
<div class="wiz-question">Waar ben je aangekomen?</div>
${ride?`<div class="alert ai" style="margin-bottom:16px">Vertrok van <strong>${esc(ride.start_addr||'?')}</strong> om ${esc(ride.dep_time||'')}</div>`:''}
<div style="display:flex;gap:8px;margin-bottom:12px">
  <input class="wiz-input-std" type="text" id="wiz-endaddr" value="${esc(S.wiz.endAddr)}"
    placeholder="Aankomstadres..."
    oninput="S.wiz.endAddr=this.value;wizCheckANext2();wizEndAddrSug(this.value)"
    autocomplete="off" style="flex:1"/>
  <button class="wiz-gps-btn" onclick="wizGetEndGPS()">📍</button>
</div>
<div id="wiz-endaddr-sug" style="margin-bottom:12px"></div>
${S.wiz.endAddr?'':suggestions}
<button class="wiz-next ${S.wiz.endAddr?'ready':''}" id="wiz-anext2" onclick="wizANext()" ${S.wiz.endAddr?'':'disabled'}>Volgende →</button>`;
  }

  else if (step === 3) {
    const endKmNum = parseInt(S.wiz.endKm||'0');
    const startKm = ride?.start_km || 0;
    const diff = endKmNum > startKm ? endKmNum - startKm : 0;
    const kmOk = endKmNum > startKm;
    const canConfirm = kmOk && !S.saving;

    content = `
<div class="wiz-label">Stap ${actief.length>1?3:2} van ${totalSteps}</div>
<div class="wiz-question">Wat is de eindstand?</div>
<div class="alert ai" style="margin-bottom:16px">Beginstand was <strong>${startKm} km</strong></div>
<input class="wiz-input-big" type="number" id="wiz-endkm" value="${esc(S.wiz.endKm)}"
  placeholder="bijv. 172045"
  oninput="S.wiz.endKm=this.value;wizCheckANext3()"
  inputmode="numeric"/>
<div class="wiz-km-diff" id="wiz-km-diff">
  ${diff>0 ? diff+' km gereden' : S.wiz.endKm ? '⚠️ Lager dan beginstand' : ''}
</div>

<div class="wiz-summary" style="margin-top:16px">
  <div style="font-size:12px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:10px">Samenvatting</div>
  <div class="wiz-sum-row"><span class="wiz-sum-label">Voertuig</span><span class="wiz-sum-val">${esc(veh?.license||'?')}</span></div>
  <div class="wiz-sum-row"><span class="wiz-sum-label">Van</span><span class="wiz-sum-val">${esc(ride?.start_addr||'?')}</span></div>
  <div class="wiz-sum-row"><span class="wiz-sum-label">Naar</span><span class="wiz-sum-val">${esc(S.wiz.endAddr)}</span></div>
  <div class="wiz-sum-row"><span class="wiz-sum-label">Vertrek</span><span class="wiz-sum-val">${esc(ride?.dep_time||'?')}</span></div>
  <div class="wiz-sum-row"><span class="wiz-sum-label">Aankomst</span><span class="wiz-sum-val">${nowTime()}</span></div>
  ${diff>0?`<div class="wiz-sum-row"><span class="wiz-sum-label">Gereden</span><span class="wiz-sum-val" style="color:var(--red);font-size:18px">${diff} km</span></div>`:''}
</div>

<button class="wiz-next ${canConfirm?'ready':''}" id="wiz-aconfirm" style="margin-top:16px"
  onclick="wizStopRit()" ${canConfirm?'':'disabled'}>
  ${S.saving ? '⏳ Opslaan...' : '📍 Opslaan — bevestigen'}
</button>
<button class="btn bw" style="background:#fff;color:#e74c3c;border:1px solid #e74c3c;padding:12px;margin-top:8px;border-radius:8px;font-size:14px;cursor:pointer" onclick="annuleerRit(S.wiz.avid)">✕ Rit annuleren (niet opslaan)</button>`;
  }

  return `
<div class="wiz-wrap">
  ${progressHtml}
  <div class="wiz-card">${content}</div>

window.wizNext = () => {
  // Stap 2 overslaan als km al bekend is
  if (S.wiz.step === 1 && S.wiz.km) {
    S.wiz.step = 3; render(); window.scrollTo(0,0);
  } else if (S.wiz.step < 4) {
    S.wiz.step++; render(); window.scrollTo(0,0);
  }
};

window.wizBack = () => {
  // Stap 2 overslaan bij terug als km bekend is
  if (S.wiz.step === 3 && S.wiz.km) {
    S.wiz.step = 1; render(); window.scrollTo(0,0);
  } else if (S.wiz.step > 1) {
    S.wiz.step--; render(); window.scrollTo(0,0);
  }
};

window.wizANext = () => {
  S.wiz.step++;
  render();
  window.scrollTo(0,0);
};

window.wizABack = () => {
  const actief = S.vehicles.filter(v => S.activeRides[v.id]);

};

window.wizGetGPS = () => {
  const inp = document.getElementById('wiz-addr');
  if (!inp) return;
  inp.placeholder = '📍 Locatie bepalen...';
  inp.disabled = true;
  if (!navigator.geolocation) { inp.placeholder='GPS niet beschikbaar'; inp.disabled=false; return; }
  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json&accept-language=nl`,{headers:{'User-Agent':'QLine-Rittenregistratie'}});
        const data = await res.json();
        const a = data.address;
        const straat = a.road||a.pedestrian||a.path||'';
        const nr = a.house_number||'';
        const plaats = a.city||a.town||a.village||a.hamlet||'';
        const adres = [straat+(nr?' '+nr:''),plaats].filter(Boolean).join(', ');
        S.wiz.addr = adres;
        inp.value = adres;
        inp.disabled = false;
        inp.placeholder = 'Adres of locatie...';
        saveAddress(adres);
        wizCheckNext3();
      } catch(e) {
        S.wiz.addr = pos.coords.latitude.toFixed(5)+', '+pos.coords.longitude.toFixed(5);
        inp.value = S.wiz.addr;
        inp.disabled = false;
        wizCheckNext3();
      }
    },
    () => { inp.placeholder='GPS geweigerd — typ handmatig'; inp.disabled=false; setTimeout(()=>{inp.placeholder='Adres of locatie...';},3000); },
    {enableHighAccuracy:true,timeout:10000}
  );
};

window.wizStartRit = async () => {
  if (S.saving) return;
  S.saving = true;
  render();
  const { vid, km, addr, purpose, tripType } = S.wiz;
  if (!vid || !km || !purpose) { flash('Vul alle velden in','error'); S.saving=false; render(); return; }
  try {
    setLastVehicle(vid);
    const ride = {
      vehicle_id: vid,
      start_km: parseInt(km),
      start_addr: addr||'',
      purpose, trip_type: tripType,
      dep_time: nowTime(),
      trip_date: nowDate(),
      user_id: S.user.uid,
      user_name: S.profile?.full_name||S.user.email,
      created_at: serverTimestamp(),
    };
    await saveAR_start(vid, ride);
    S.saving = false;
    flash('Goede reis! Druk op 📍 Aankomst als je er bent.');
    go('dash');
  } catch(e) {
    S.saving = false;
    flash('Fout: '+e.message,'error');
    render();
  }
};

// ── Rit stoppen (wizard) ──────────────────────────────────────────────────────
window.wizStopRit = async () => {
  if (S.saving) return;
  S.saving = true;
  render();
  const vid = S.wiz.avid;
  const endKm = parseInt(S.wiz.endKm||'0');
  const addr = S.wiz.endAddr;
  const time = nowTime();
  const ride = S.activeRides[vid];
  if (!ride) { flash('Geen actieve rit gevonden','error'); S.saving=false; render(); return; }
  if (endKm <= ride.start_km) { flash('Eindstand moet hoger zijn dan beginstand','error'); S.saving=false; render(); return; }
  const v = S.vehicles.find(x=>x.id===vid);
  try {
    saveAddress(addr);
    saveAddress(ride.start_addr);
    await addDoc(collection(db,'trips'),{
      vehicle_id: vid,
      vehicle_license: v?.license||'',
      user_id: ride.user_id,
      user_name: ride.user_name,
      trip_date: ride.trip_date,
      departure_time: ride.dep_time,
      arrival_time: time,
      odometer_start: ride.start_km,
      odometer_end: endKm,
      km_total: endKm - ride.start_km,
      departure_address: ride.start_addr||'',
      arrival_address: addr,
      purpose: ride.purpose,
      trip_type: ride.trip_type||'Zakelijk',
      notes: '',
      detour: false, detour_reason: '', private_km: 0,
      status: 'open',
      created_at: serverTimestamp(),
    });
    if (v) { v.last_km=endKm; v.last_addr=addr; v.last_date=ride.trip_date; }
    setVehicleKm(vid, endKm, addr);
    localStorage.setItem('qline_last_addr_' + vid, addr);
    await saveAR_stop(vid);
    await loadTrips();
    S.saving = false;
    flash('Rit opgeslagen ✓ — '+(endKm-ride.start_km)+' km gereden');
    go('trips');
  } catch(e) {
    S.saving = false;
    flash('Fout: '+e.message,'error');
    render();
  }
};

// ── Annuleer rit ──────────────────────────────────────────────────────────────
window.annuleerRit = async (vid) => {
  if (!vid) { flash('Geen actieve rit gevonden','error'); return; }
  const ride = S.activeRides[vid];
  if (ride?._docId) {
    try { await deleteDoc(doc(db,'active_rides',ride._docId)); } catch(e) {}
  } else {
    try {
      const snap = await getDocs(query(collection(db,'active_rides'),where('vehicle_id','==',vid)));
      for (const d of snap.docs) await deleteDoc(doc(db,'active_rides',d.id));
    } catch(e) {}
  }
  delete S.activeRides[vid];
  flash('Rit geannuleerd');
  go('dash');
};

function filteredTrips() {
  return S.trips.filter(t => {
    if (S.ff.from && t.trip_date < S.ff.from) return false;
    if (S.ff.to   && t.trip_date > S.ff.to)   return false;
    if (S.ff.type && t.trip_type !== S.ff.type) return false;
    if (S.ff.status && t.status !== S.ff.status) return false;
    if (S.ff.search) {
      const s = S.ff.search.toLowerCase();
      if (!(t.purpose||'').toLowerCase().includes(s) &&
          !(t.departure_address||'').toLowerCase().includes(s) &&
          !(t.arrival_address||'').toLowerCase().includes(s) &&
          !(t.user_name||'').toLowerCase().includes(s)) return false;
    }
    return true;
  });
}

    <span style="font-size:12px;color:#888">${esc(u.email||'')}</span></div>
    <select onchange="changeRole('${u.id}',this.value)" style="font-size:13px;padding:6px 8px;border-radius:6px;border:1px solid #ddd">
      <option value="medewerker" ${u.role==='medewerker'?'selected':''}>Medewerker</option>
      <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
    </select>
  </div>`).join('')}
</div>`;
}

function renderAdminApprove() {
  const open = S.trips.filter(t=>t.status==='open');
  return `
<div class="card">
  <div class="ch">Openstaand (${open.length})</div>
  ${open.length===0?'<div class="empty"><div class="ei">✅</div><p>Alles verwerkt</p></div>':''}
  ${open.map(t=>`
  <div style="padding:14px 16px;border-bottom:1px solid #f0f0f0">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
      <div>
        <p style="font-weight:600;font-size:14px">${esc(t.trip_date)} · ${esc(t.user_name||'')} · ${esc(t.vehicle_license||'')}</p>
        <p style="font-size:12px;color:#666">${esc(t.departure_address||'')} → ${esc(t.arrival_address||'')}</p>
        <p style="font-size:16px;font-weight:700;color:var(--red);margin-top:4px">${t.km_total||0} km</p>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        <button class="btn bsu bsm" onclick="approve('${t.id}','goedgekeurd')">✓ Goed</button>
        <button class="btn bd bsm" onclick="approve('${t.id}','afgekeurd')">✗ Af</button>
      </div>
    </div>
  </div>`).join('')}
</div>`;
}

// ── Login ─────────────────────────────────────────────────────────────────────
function renderLogin() {
  return `
<div class="login-wrap">
  <div class="login-logo">
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px">
      <div style="width:4px;height:28px;background:var(--red);border-radius:2px"></div>
      <span style="color:#fff;font-size:18px;font-weight:700;letter-spacing:.15em">Q-LINE</span>
    </div>
    <p style="color:#888;font-size:11px;letter-spacing:.05em">RITTENREGISTRATIE</p>
    <p style="color:#555;font-size:10px;margin-top:4px">PIONEERS IN EQUESTRIAN INNOVATION</p>
  </div>
  <div class="login-card">
    <h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Inloggen</h2>
    <div id="lerr"></div>
    <div class="fg"><label>E-mailadres</label><input type="email" id="lem" placeholder="naam@q-line.com"/></div>
    <div class="fg"><label>Wachtwoord</label><input type="password" id="lpw" placeholder="••••••••"/></div>
    <button class="btn bp bw" id="lbtn">Inloggen</button>
  </div>
</div>`;
}

function bindLogin() {
  const btn = document.getElementById('lbtn');
  const doLogin = async () => {
    const em = document.getElementById('lem').value;
    const pw = document.getElementById('lpw').value;
    document.getElementById('lerr').innerHTML = '';
    btn.textContent = 'Bezig…'; btn.disabled = true;
    try {
      await signInWithEmailAndPassword(auth, em, pw);
    } catch(e) {
      document.getElementById('lerr').innerHTML = '<div class="alert ae" style="margin-bottom:12px">Onjuist e-mailadres of wachtwoord</div>';
      btn.textContent = 'Inloggen'; btn.disabled = false;
    }
  };
  btn.onclick = doLogin;
  document.getElementById('lpw').onkeydown = e => { if(e.key==='Enter') doLogin(); };
}

function bindEvents() {}

// ── Global actions ────────────────────────────────────────────────────────────
window.doSignOut = () => signOut(auth);
window.go = go;
window.setFF = (k,v) => { S.ff[k]=v; render(); };
window.resetFF = () => { S.ff={from:'',to:'',type:'',status:'',search:''}; render(); };
window.setAdminTab = async (t) => { S.adminTab=t; if(t==='users') await loadUsers(); render(); };

window.approve = async (id, status) => {
  await updateDoc(doc(db,'trips',id),{status,approved_by:S.user.uid,approved_at:serverTimestamp()});
  S.trips = S.trips.map(t => t.id===id ? {...t,status} : t);
  if (S.detailTrip?.id===id) S.detailTrip = {...S.detailTrip,status};
  flash(status==='goedgekeurd'?'Rit goedgekeurd ✓':'Rit afgekeurd');
};

window.exportCSV = () => {
  const trips = filteredTrips();
  const hdr = ['Datum','Rijder','Kenteken','Begin','Eind','km','Van','Naar','Doel','Type','Status'];
  const rows = trips.map(t=>[t.trip_date,t.user_name,t.vehicle_license,t.odometer_start,t.odometer_end,t.km_total,t.departure_address,t.arrival_address,t.purpose,t.trip_type,t.status].map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(';'));
  const csv = '\uFEFF'+[hdr.join(';'),...rows].join('\n');
  const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([csv],{type:'text/csv'})),download:'ritten.csv'});
  a.click();
};

window.addVehicle = async () => {
  const l=document.getElementById('vl')?.value?.trim();
  const b=document.getElementById('vb')?.value?.trim();
  const m=document.getElementById('vm')?.value?.trim();
  if (!l) { flash('Kenteken verplicht','error'); return; }
  await addDoc(collection(db,'vehicles'),{license:l,brand:b||'',model:m||'',active:true,created_at:serverTimestamp()});
  await loadVehicles(); flash('Voertuig toegevoegd ✓');
};

window.addUser = async () => {
  const n=document.getElementById('un')?.value?.trim();
  const e=document.getElementById('ue')?.value?.trim();
  const p=document.getElementById('up')?.value;
  if(!e||!p) { flash('E-mail en wachtwoord verplicht','error'); return; }
  try {
    const cred = await createUserWithEmailAndPassword(auth,e,p);
    await setDoc(doc(db,'users',cred.user.uid),{email:e,full_name:n||e,role:'medewerker',created_at:serverTimestamp()});
    flash('Gebruiker aangemaakt ✓');
    await loadUsers(); render();
  } catch(err) { flash('Fout: '+err.message,'error'); }
};

window.deleteTrip = async (id) => {
  await deleteDoc(doc(db,'trips',id));
  S.trips = S.trips.filter(t => t.id !== id);
  if (S.detailTrip?.id === id) { S.detailTrip=null; go('trips'); return; }
  flash('Rit verwijderd'); render();
};

window.changeRole = async (id, role) => {
  await updateDoc(doc(db,'users',id),{role});
  S.users = S.users.map(u => u.id===id?{...u,role}:u);
  flash('Rol bijgewerkt ✓'); render();
};

window.resetAlleRitten = async () => {
  const snap = await getDocs(collection(db,'active_rides'));
  for (const d of snap.docs) await deleteDoc(doc(db,'active_rides',d.id));
  S.activeRides = {};
  flash('Alle actieve ritten gereset'); go('dash');
};

render();
</script>
</body>
</html>
